version: '3.9'

services:
  # ─── Base de données PostgreSQL ───
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: studyflow_db
      POSTGRES_USER: studyflow_user
      POSTGRES_PASSWORD: studyflow_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyflow_user -d studyflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Django ───
  backend:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn studyflow.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=changez-moi-en-production
      - DEBUG=False
      - DATABASE_URL=postgres://studyflow_user:studyflow_pass@db:5432/studyflow_db
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume:
  media_volume:
